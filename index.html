<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTrack | Daily Calorie Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 font-sans text-gray-800 min-h-screen">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">NutriTrack</h1>
                <p class="text-gray-500 text-sm mt-1">Keep tabs on your daily energy intake efficiently.</p>
            </div>
            <div class="text-center md:text-right">
                <p class="text-xs uppercase tracking-wider text-gray-400 font-semibold">Total Consumed</p>
                <p id="total-calories" class="text-4xl font-black text-emerald-500 transition-all duration-300">0 <span class="text-sm font-medium text-gray-500">kcal</span></p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <section class="md:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-lg font-bold text-gray-900 mb-4">Log a Meal</h2>
                    <form id="food-form" class="space-y-4">
                        <div>
                            <label for="food-name" class="block text-xs font-semibold text-gray-500 uppercase mb-1">Food Name</label>
                            <input type="text" id="food-name" required placeholder="e.g., Chicken Breast" 
                                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all text-sm">
                        </div>
                        
                        <div class="flex justify-end">
                            <button type="button" id="btn-fetch" class="text-xs font-medium text-emerald-600 hover:text-emerald-700 hover:underline flex items-center gap-1 focus:outline-none">
                                 Auto-fill Calories
                            </button>
                        </div>

                        <div>
                            <label for="food-calories" class="block text-xs font-semibold text-gray-500 uppercase mb-1">Calories (kcal)</label>
                            <input type="number" id="food-calories" required min="1" placeholder="e.g., 165" 
                                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all text-sm">
                        </div>

                        <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-2.5 px-4 rounded-xl shadow-sm transition-all text-sm mt-2">
                            Add to Log
                        </button>
                    </form>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-sm font-bold text-gray-900 mb-2">Options</h3>
                    <p class="text-xs text-gray-400 mb-4">Clear everything out to restart tracking for a brand new calendar day.</p>
                    <button id="btn-reset" class="w-full border border-rose-200 text-rose-600 hover:bg-rose-50 font-medium py-2 px-4 rounded-xl transition-all text-sm">
                        Reset Day Tracker
                    </button>
                </div>
            </section>

            <main class="md:col-span-2">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-full flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold text-gray-900">Today's Meals</h2>
                        <span id="item-count" class="bg-gray-100 text-gray-600 text-xs font-semibold px-2.5 py-1 rounded-full">0 items</span>
                    </div>

                    <div class="flex-grow">
                        <div id="empty-state" class="flex flex-col items-center justify-center py-16 text-center">
                            <span class="text-4xl mb-2"></span>
                            <p class="text-sm font-medium text-gray-500">Your food log is looking empty.</p>
                            <p class="text-xs text-gray-400 max-w-[240px] mt-0.5">Log custom meals or use the auto-fill finder to begin.</p>
                        </div>

                        <ul id="food-list" class="divide-y divide-gray-100 hidden">
                            </ul>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
